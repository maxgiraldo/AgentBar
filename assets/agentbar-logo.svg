<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">AgentBar logo</title>
  <desc id="desc">A dark rounded-square app icon with green and yellow agent status indicators orbiting a stylized A.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="64" x2="896" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10261f"/>
      <stop offset="0.48" stop-color="#0b1224"/>
      <stop offset="1" stop-color="#241136"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(318 294) rotate(47) scale(554)">
      <stop offset="0" stop-color="#65f090" stop-opacity="0.65"/>
      <stop offset="0.42" stop-color="#44d16f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#44d16f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowYellow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(735 280) rotate(120) scale(420)">
      <stop offset="0" stop-color="#ffc400" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffc400" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffc400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="205" y1="238" x2="819" y2="786" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6bff96"/>
      <stop offset="0.52" stop-color="#33d36d"/>
      <stop offset="1" stop-color="#1ba855"/>
    </linearGradient>
    <linearGradient id="aStroke" x1="350" y1="318" x2="670" y2="734" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9ffe0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="statusGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="72" y="72" width="880" height="880" rx="216" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="72" y="72" width="880" height="880" rx="216" fill="url(#glowGreen)"/>
  <rect x="72" y="72" width="880" height="880" rx="216" fill="url(#glowYellow)"/>
  <rect x="106" y="106" width="812" height="812" rx="184" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4"/>

  <circle cx="512" cy="512" r="284" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="44"/>
  <path d="M260 383a284 284 0 1 1 54 326" fill="none" stroke="url(#ring)" stroke-width="52" stroke-linecap="round"/>
  <circle cx="750" cy="356" r="58" fill="#ffc400" filter="url(#statusGlow)"/>
  <circle cx="315" cy="710" r="50" fill="#35d56c" filter="url(#statusGlow)"/>

  <path d="M350 700 484 326c9-26 47-26 56 0l134 374" fill="none" stroke="url(#aStroke)" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M430 580h164" fill="none" stroke="#ffffff" stroke-opacity="0.92" stroke-width="58" stroke-linecap="round"/>
  <path d="M308 780h408" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="24" stroke-linecap="round"/>
  <path d="M382 820h260" fill="none" stroke="#35d56c" stroke-opacity="0.9" stroke-width="18" stroke-linecap="round"/>
</svg>
